{% extends "base.html" %}
{% block title %}Add User{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h2>Add User</h2>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <p style="margin-bottom: 16px; opacity: 0.85;">
      Role is detected automatically from email:
      <br>
      <strong>Student:</strong> sXXXXXXX@stu.najah.edu
      <br>
      <strong>Instructor:</strong> name@najah.edu
    </p>

    <form method="POST" enctype="multipart/form-data">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-grid">
        <input type="text" name="username" placeholder="Username" value="{{ form_data.username }}" required />
        <input type="text" name="name" placeholder="Full Name (required for student accounts)" value="{{ form_data.name }}" />
        <input type="email" name="email" placeholder="Email" value="{{ form_data.email }}" required />
        <input type="password" name="password" placeholder="Password" required />
        <input type="password" name="confirm_password" placeholder="Confirm Password" required />
        <input type="file" name="profile_picture" accept="image/*" />
        <button type="submit">Add User</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
