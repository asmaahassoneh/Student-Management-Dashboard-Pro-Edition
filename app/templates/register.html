{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1>Register</h1>
    <p style="margin-bottom: 16px; opacity: 0.85;">
      Use your An-Najah email:
    </p>

    <form method="POST" enctype="multipart/form-data">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-grid">
        <input type="text" name="name" placeholder="Full Name" value="{{ request.form.get('name', '') }}" required />
        <input type="text" name="username" placeholder="Username" value="{{ request.form.get('username', '') }}" required />
        <input type="email" name="email" placeholder="Email" value="{{ request.form.get('email', '') }}" required />
        <input type="password" name="password" placeholder="Password" required />
        <input type="password" name="confirm_password" placeholder="Confirm Password" required />
        <input type="file" name="profile_picture" accept="image/*" />
        <button type="submit">Register</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
