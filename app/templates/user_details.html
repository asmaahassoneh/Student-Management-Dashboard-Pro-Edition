{% extends "base.html" %}
{% block title %}User Details{% endblock %}

{% block content %}
<div class="home">
  <div class="glass-card">
    <h2>User Details</h2>

    {% if user.profile_picture %}
    <div style="margin-bottom: 20px;">
      <img src="{{ url_for('static', filename='uploads/' + user.profile_picture) }}" alt="Profile" class="detail-profile-pic" />
    </div>
    {% endif %}

    <div class="detail-item">
      <span>Username</span>
      <p>{{ user.username }}</p>
    </div>

    <div class="detail-item">
      <span>Email</span>
      <p>{{ user.email }}</p>
    </div>

    <div class="detail-item">
      <span>Role</span>
      <p>{{ user.role|capitalize }}</p>
    </div>

    <a class="btn" href="{{ url_for('user_page_bp.edit_user', user_id=user.id) }}">Edit</a>
  </div>
</div>
{% endblock %}
